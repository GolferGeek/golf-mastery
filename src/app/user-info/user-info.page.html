<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>User</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content>
  <form [formGroup]="userInfoForm">
    <ion-item>
      <ion-label position="stacked">Email</ion-label>
      <ion-input
        formControlName="email"
        type="email"
        placeholder="Your email address"
      >
      </ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="stacked">Username</ion-label>
      <ion-input
        formControlName="userName"
        type="string"
        placeholder="Your username"
      >
      </ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="stacked">First name</ion-label>
      <ion-input
        formControlName="firstName"
        type="string"
        placeholder="Your first name"
      >
      </ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="stacked">Last name</ion-label>
      <ion-input
        formControlName="lastName"
        type="string"
        placeholder="Your last name"
      >
      </ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="stacked">Phone</ion-label>
      <ion-input
        formControlName="phone"
        type="phone"
        placeholder="Your phone number"
      >
      </ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="stacked">Picture URL</ion-label>
      <ion-input
        formControlName="pictureUrl"
        type="string"
        placeholder="Your picture URL"
      >
      </ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="stacked">Are you a coach?</ion-label>
      <ion-checkbox formControlName="isCoach"> </ion-checkbox>
    </ion-item>
    <ion-button
      (click)="updateUserInfo(userInfoForm)"
      expand="block"
      [disabled]="!userInfoForm.valid"
    >
      Save
    </ion-button>
  </form>
</ion-content>
