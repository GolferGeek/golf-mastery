<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>New Tees</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <form #f="ngForm" (ngSubmit)="onSubmit(f)">
    <ion-grid>
      <ion-row>
        <ion-col>
          <ion-item class="ion-no-padding">
            <ion-label position="stacked">Color</ion-label>
            <ion-input
              name="color"
              required
              [(ngModel)]="tees.name"
              type="text"
              placeholder="tees?"
            >
            </ion-input>
          </ion-item>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col>
          <ion-item class="ion-no-padding">
            <ion-label position="stacked">Distance</ion-label>
            <ion-input
              size="2"
              name="distance"
              [(ngModel)]="tees.distance"
              type="distance"
              placeholder="distance"
            >
            </ion-input>
          </ion-item>
        </ion-col>
        <ion-col>
          <ion-item class="ion-no-padding">
            <ion-label position="stacked">Par</ion-label>
            <ion-input
              size="2"
              name="distance"
              [(ngModel)]="tees.distance"
              type="distance"
              placeholder="distance"
            >
            </ion-input>
          </ion-item>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col>
          <app-side></app-side>
          <app-side></app-side>
        </ion-col>
      </ion-row>
    </ion-grid>
    <ion-button [disabled]="f.invalid" expand="block" type="submit">
      Create Course
    </ion-button>
  </form>
</ion-content>
