<ion-app>
  <ion-split-pane contentId="main-content">
    <ion-menu contentId="main-content" type="overlay">
      <ion-content>
        <ion-list id="inbox-list">
          <ion-list-header>
            <ion-label>Every Shot</ion-label>
            <ion-button color="secondary" fill="outline" (click)="logout()" *ngIf="authService.isLoggedIn">Log Out</ion-button>
            <ion-button color="secondary" fill="outline" (click)="login()" *ngIf="!authService.isLoggedIn">Log In</ion-button>
          </ion-list-header>
          <ion-menu-toggle auto-hide="false" *ngIf="authService.isLoggedIn">
            <ion-item routerDirection="root" routerLink="course" lines="none" detail="false">
              <ion-icon name="golf-outline"></ion-icon>
              <ion-label>Courses</ion-label>
            </ion-item>
          </ion-menu-toggle>
        </ion-list>
      </ion-content>
    </ion-menu>
    <ion-router-outlet id="main-content"></ion-router-outlet>
  </ion-split-pane>
</ion-app>
